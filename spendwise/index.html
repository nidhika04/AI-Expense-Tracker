<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendWise — Login</title>
  <link rel="stylesheet" href="css/auth.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-blob b3"></div>

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-box"><i class="fas fa-wallet"></i></div>
        <h1>SpendWise</h1>
        <p>AI-powered money manager</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
        <div class="tab-bar" id="tabBar"></div>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginPanel" class="panel active">
        <div class="field">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="lEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="pw-wrap">
            <input type="password" id="lPass" placeholder="Your password"/>
            <button class="eye" onclick="toggleEye('lPass',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div id="lMsg" class="msg hidden"></div>
        <button class="btn-main" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupPanel" class="panel">
        <div class="field">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="sName" placeholder="Your full name"/>
        </div>
        <div class="field">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="sEmail" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="pw-wrap">
            <input type="password" id="sPass" placeholder="Min. 6 characters"/>
            <button class="eye" onclick="toggleEye('sPass',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div id="sMsg" class="msg hidden"></div>
        <button class="btn-main" onclick="doSignup()"><i class="fas fa-user-plus"></i> Create Account</button>
      </div>

      <p class="demo-note">
        <i class="fas fa-info-circle"></i>
        No server needed! Data saved in your browser.
      </p>

    </div>
  </div>

  <script>
    // ─── If already logged in, go to dashboard ───
    if (localStorage.getItem('sw_user')) {
      window.location.href = 'pages/dashboard.html';
    }

    // ─── Tab switch ───
    let curTab = 'login';
    function switchTab(t) {
      curTab = t;
      document.getElementById('loginPanel').classList.toggle('active', t === 'login');
      document.getElementById('signupPanel').classList.toggle('active', t === 'signup');
      document.getElementById('tabLogin').classList.toggle('active', t === 'login');
      document.getElementById('tabSignup').classList.toggle('active', t === 'signup');
      document.getElementById('tabBar').style.transform = t === 'signup' ? 'translateX(100%)' : 'translateX(0)';
    }

    // ─── Toggle password visibility ───
    function toggleEye(id, btn) {
      const inp = document.getElementById(id);
      const ic  = btn.querySelector('i');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      ic.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    // ─── Show message ───
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    // ─── Get users DB ───
    function getUsers() {
      return JSON.parse(localStorage.getItem('sw_users') || '[]');
    }
    function saveUsers(u) {
      localStorage.setItem('sw_users', JSON.stringify(u));
    }

    // ─── LOGIN ───
    function doLogin() {
      const email = document.getElementById('lEmail').value.trim();
      const pass  = document.getElementById('lPass').value;

      if (!email || !pass) return showMsg('lMsg','Please fill in all fields.','error');

      const users = getUsers();
      const user  = users.find(u => u.email === email && u.password === pass);

      if (!user) return showMsg('lMsg','Wrong email or password.','error');

      localStorage.setItem('sw_user', JSON.stringify({ name: user.name, email: user.email }));
      showMsg('lMsg', 'Login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 700);
    }

    // ─── SIGNUP ───
    function doSignup() {
      const name  = document.getElementById('sName').value.trim();
      const email = document.getElementById('sEmail').value.trim();
      const pass  = document.getElementById('sPass').value;

      if (!name || !email || !pass) return showMsg('sMsg','Please fill in all fields.','error');
      if (pass.length < 6)          return showMsg('sMsg','Password must be 6+ characters.','error');

      const users = getUsers();
      if (users.find(u => u.email === email)) return showMsg('sMsg','Email already registered. Please login.','error');

      users.push({ name, email, password: pass });
      saveUsers(users);

      localStorage.setItem('sw_user', JSON.stringify({ name, email }));
      showMsg('sMsg', 'Account created! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 700);
    }

    // ─── Enter key ───
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') curTab === 'login' ? doLogin() : doSignup();
    });
  </script>
</body>
</html>
